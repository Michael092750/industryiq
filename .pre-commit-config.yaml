repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies: ["fastapi>=0.115", "pypdf>=5.0", "python-docx>=1.1", "python-dotenv>=1.0", "psycopg>=3.1"]
