# Local development services. Start with:  docker compose up -d
# Stop with:                                docker compose down
# Stop and wipe data:                       docker compose down -v
services:
  db:
    # Prebuilt Postgres image with the pgvector extension already installed.
    image: pgvector/pgvector:pg16
    container_name: ragproject_db
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragproject
    ports:
      # host:container -> reach the DB from your app at localhost:5432
      - "5432:5432"
    volumes:
      # Named volume keeps the data on disk so it survives `docker compose down`.
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d ragproject"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    # Build our own image from the Dockerfile in this directory.
    build: .
    container_name: ragproject_app
    environment:
      # Inside the compose network, the DB host is the service name "db" (not localhost).
      DATABASE_URL: postgresql://rag:ragpass@db:5432/ragproject
      DEBUG_API_KEY: ${DEBUG_API_KEY:-}
      # Default to free offline fakes; the server sets RAG_PROVIDER=bedrock in its .env.
      RAG_PROVIDER: ${RAG_PROVIDER:-fake}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    ports:
      - "8000:8000"
    depends_on:
      # Wait until the database reports healthy before starting the app.
      db:
        condition: service_healthy

volumes:
  pg_data:
